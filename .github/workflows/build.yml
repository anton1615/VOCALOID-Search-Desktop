name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vocaloid-search-desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: vocaloid-search-desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: vocaloid-search-desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: vocaloid-search-desktop
        run: npm run tauri build

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocaloid-search-desktop-windows
          path: vocaloid-search-desktop/src-tauri/target/release/vocaloid-search-desktop.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vocaloid-search-desktop-windows
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/vocaloid-search-desktop.exe
          generate_release_notes: true
